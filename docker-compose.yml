services:
  web:
    build: .
    image: lcode-select-school:latest
    container_name: lcode-select-school
    ports:
      - "8080:80"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/views.db
      - PORT=80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost/api/views').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
