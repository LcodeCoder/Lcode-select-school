server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Static assets with long cache (Vite hashes filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Data JSON (re-validated)
  location /data/ {
    expires 1d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback (hash routing, but cover direct hits too)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
